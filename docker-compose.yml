services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colify-app
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: ["/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-colify}
      - DB_USERNAME=${DB_USERNAME:-colify}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - colify-network
    depends_on:
      mysql:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: colify-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - colify-network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: colify-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-colify}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-colify}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - colify-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js - for Vite build & dev server
  node:
    image: node:22-alpine
    container_name: colify-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - colify-network
    profiles:
      - dev

  # Queue Worker (optional - for background jobs)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colify-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3
    volumes:
      - .:/var/www/html
    networks:
      - colify-network
    depends_on:
      - app
      - mysql
    profiles:
      - full

networks:
  colify-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  node-modules:
    driver: local
